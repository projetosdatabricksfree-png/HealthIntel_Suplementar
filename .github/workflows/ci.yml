name: ci

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: healthintel
          POSTGRES_USER: healthintel
          POSTGRES_PASSWORD: healthintel
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U healthintel -d healthintel"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
      mongo:
        image: mongo:7
        ports:
          - 27017:27017

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: healthintel
      POSTGRES_USER: healthintel
      POSTGRES_PASSWORD: healthintel
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      MONGO_HOST: localhost
      MONGO_PORT: 27017
      MONGO_DB: healthintel_layout
      MONGO_INITDB_ROOT_USERNAME: healthintel
      MONGO_INITDB_ROOT_PASSWORD: healthintel
      API_ENV: ci
      API_ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      API_CORS_ALLOWED_ORIGINS: http://localhost
      API_JWT_ADMIN_SECRET: ci_admin_secret_healthintel
      API_MAX_REQUEST_SIZE_BYTES: 1048576
      LAYOUT_SERVICE_ENV: ci
      LAYOUT_SERVICE_ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      LAYOUT_SERVICE_MAX_REQUEST_SIZE_BYTES: 1048576
      LAYOUT_SERVICE_TOKEN: ci_layout_service_token_healthintel
      LOG_LEVEL: INFO

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar cliente psql
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Instalar dependencias
        run: pip install -e .[dev]

      - name: Renderizar docker compose
        run: docker compose -f infra/docker-compose.yml config > /tmp/healthintel-compose.yml

      - name: Inicializar schemas Postgres
        env:
          PGPASSWORD: healthintel
        run: |
          psql -h localhost -U healthintel -d healthintel -f infra/postgres/init/001_schemas.sql
          psql -h localhost -U healthintel -d healthintel -f infra/postgres/init/002_bronze_operacional.sql
          psql -h localhost -U healthintel -d healthintel -f infra/postgres/init/003_api_comercial.sql
          psql -h localhost -U healthintel -d healthintel -f infra/postgres/init/004_billing_governanca.sql
          psql -h localhost -U healthintel -d healthintel -f infra/postgres/init/005_regulatorio.sql

      - name: Popular dados demo
        run: |
          python scripts/seed_demo_core.py
          python scripts/seed_demo_regulatorio.py

      - name: Ruff
        run: ruff check .

      - name: SQLFluff
        run: |
          cd healthintel_dbt
          DBT_LOG_PATH=/tmp/healthintel_dbt_logs DBT_TARGET_PATH=/tmp/healthintel_dbt_target dbt deps
          cd ..
          DBT_LOG_PATH=/tmp/healthintel_dbt_logs DBT_TARGET_PATH=/tmp/healthintel_dbt_target sqlfluff lint healthintel_dbt/models healthintel_dbt/tests

      - name: Pytest
        run: pytest

      - name: dbt build
        run: |
          cd healthintel_dbt
          DBT_LOG_PATH=/tmp/healthintel_dbt_logs DBT_TARGET_PATH=/tmp/healthintel_dbt_target dbt build
