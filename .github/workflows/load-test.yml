name: load-test

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "URL base do ambiente alvo"
        required: true
        default: "https://staging.healthintel.local"
      duration:
        description: "Duracao do teste"
        required: true
        default: "60s"
      users:
        description: "Usuarios concorrentes"
        required: true
        default: "20"
      spawn_rate:
        description: "Taxa de subida"
        required: true
        default: "4"
      cache_mode:
        description: "Modo do cache: hot, cold ou mixed"
        required: true
        default: "mixed"

jobs:
  locust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -e .[dev]

      - name: Executar teste de carga
        env:
          HOST: ${{ inputs.target_url }}
          DURATION: ${{ inputs.duration }}
          USERS: ${{ inputs.users }}
          SPAWN_RATE: ${{ inputs.spawn_rate }}
          CACHE_MODE: ${{ inputs.cache_mode }}
          API_KEY: ${{ secrets.LOAD_TEST_API_KEY }}
        run: bash scripts/run_load_test.sh

      - name: Publicar artefatos CSV
        uses: actions/upload-artifact@v4
        with:
          name: locust-results
          path: testes/load/resultados/*.csv
