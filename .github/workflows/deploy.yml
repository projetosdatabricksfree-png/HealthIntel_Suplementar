name: deploy

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: ["main"]

jobs:
  deploy:
    name: Deploy VPS
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to VPS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          source: "."
          target: ${{ secrets.VPS_PROJECT_PATH }}
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd ${{ secrets.VPS_PROJECT_PATH }}

            echo ">>> rebuild app services"
            docker compose \
              --env-file .env.hml \
              -f infra/docker-compose.yml \
              -f infra/docker-compose.hml.yml \
              up -d --build --no-deps \
              api mongo_layout_service nginx frontend

            echo ">>> health check"
            sleep 10
            curl -sf http://localhost:8080/saude | grep '"status":"ok"'

            echo ">>> deploy ok"
