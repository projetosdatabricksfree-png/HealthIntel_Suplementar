name: deploy

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: ["main"]

jobs:
  deploy:
    name: Deploy VPS
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd ${{ secrets.VPS_PROJECT_PATH }}

            echo ">>> pulling latest changes from main"
            git -c "url.https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/.insteadOf=https://github.com/" \
                pull origin main

            echo ">>> restarting services"
            make up

            echo ">>> checking health"
            sleep 15
            curl -sf http://localhost:8080/saude | grep '"status":"ok"'

            echo ">>> deploy ok"
