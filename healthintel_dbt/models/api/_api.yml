version: 2

models:
  - name: api_operadora
    description: Camada desnormalizada de leitura da API.
    columns:
      - name: registro_ans
        data_tests:
          - not_null
          - unique
  - name: api_score_operadora_mensal
    description: Camada mensal detalhada de score exposta pela API.
    columns:
      - name: registro_ans
        data_tests:
          - not_null
      - name: competencia
        data_tests:
          - not_null
  - name: api_regulatorio_operadora_trimestral
    description: Camada trimestral regulatória por operadora exposta pela API.
    columns:
      - name: registro_ans
        data_tests:
          - not_null
      - name: trimestre
        data_tests:
          - not_null
  - name: api_rn623_lista_trimestral
    description: Listas trimestrais RN 623 para exploração na API.
    columns:
      - name: registro_ans
        data_tests:
          - not_null
      - name: trimestre
        data_tests:
          - not_null
      - name: tipo_lista
        data_tests:
          - not_null
  - name: api_regime_especial_operadora
    description: Historico de regime especial por operadora para a API.
    columns:
      - name: registro_ans
        data_tests:
          - not_null
      - name: trimestre
        data_tests:
          - not_null
  - name: api_portabilidade_operadora_mensal
    description: Movimentacao mensal de portabilidade por operadora.
    columns:
      - name: registro_ans
        data_tests:
          - not_null
      - name: competencia
        data_tests:
          - not_null
  - name: api_score_regulatorio_operadora_mensal
    description: Score regulatorio composto e detalhado por operadora.
    columns:
      - name: registro_ans
        data_tests:
          - not_null
      - name: competencia
        data_tests:
          - not_null
  - name: api_financeiro_operadora_mensal
    description: Serie financeira mensal consolidada de DIOPS, FIP, VDA e glosa.
    columns:
      - name: registro_ans
        data_tests:
          - not_null
      - name: competencia
        data_tests:
          - not_null
  - name: api_score_v2_operadora_mensal
    description: Score composto v2 mensal por operadora.
    columns:
      - name: registro_ans
        data_tests:
          - not_null
      - name: competencia
        data_tests:
          - not_null
  - name: api_rede_assistencial
    description: Rede assistencial desnormalizada para endpoints por operadora e municipio.
    columns:
      - name: registro_ans
        data_tests:
          - not_null
      - name: competencia
        data_tests:
          - not_null
      - name: cd_municipio
        data_tests:
          - not_null
  - name: api_market_share_mensal
    description: Camada de leitura do market share mensal.
  - name: api_oportunidade_municipio_mensal
    description: Camada de leitura do score de oportunidade mensal por municipio.
  - name: api_oportunidade_v2_municipio_mensal
    description: Camada de leitura da oportunidade v2 mensal por municipio.
    columns:
      - name: cd_municipio
        data_tests:
          - not_null
      - name: competencia
        data_tests:
          - not_null
  - name: api_ranking_crescimento
    description: Ranking de crescimento por operadora.
  - name: api_ranking_score
    description: Ranking de score por operadora.
  - name: api_ranking_oportunidade
    description: Ranking de oportunidade por municipio.
  - name: api_vazio_assistencial
    description: Vazios assistenciais por municipio e segmento.
    columns:
      - name: cd_municipio
        data_tests:
          - not_null
      - name: competencia
        data_tests:
          - not_null
      - name: segmento
        data_tests:
          - not_null
  - name: api_cnes_municipio
    description: Leitura API de estabelecimentos CNES agregados por municipio e tipo de unidade.
    columns:
      - name: competencia
        data_tests:
          - not_null
      - name: cd_municipio
        data_tests:
          - not_null
      - name: tipo_unidade
        data_tests:
          - not_null
  - name: api_cnes_rede_gap
    description: Leitura API do gap entre CNES e rede declarada por municipio.
    columns:
      - name: competencia
        data_tests:
          - not_null
      - name: cd_municipio
        data_tests:
          - not_null
      - name: tipo_unidade
        data_tests:
          - not_null
  - name: api_tiss_operadora_trimestral
    description: Leitura API de procedimentos TISS consolidados por operadora.
    columns:
      - name: trimestre
        data_tests:
          - not_null
      - name: registro_ans
        data_tests:
          - not_null
      - name: grupo_procedimento
        data_tests:
          - not_null
  - name: api_sinistralidade_procedimento
    description: Leitura API da sinistralidade por grupo de procedimento.
    columns:
      - name: trimestre
        data_tests:
          - not_null
      - name: registro_ans
        data_tests:
          - not_null
      - name: grupo_procedimento
        data_tests:
          - not_null
  - name: api_glosa_operadora_mensal
    description: Glosa mensal por operadora para o Core ANS.
    columns:
      - name: registro_ans
        data_tests:
          - not_null
      - name: competencia
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "between 200001 and 209912"
  - name: api_prudencial_operadora_trimestral
    description: Indicadores prudenciais trimestrais por operadora para o Core ANS.
    columns:
      - name: registro_ans
        data_tests:
          - not_null
      - name: trimestre
        data_tests:
          - not_null
  - name: api_regime_especial_operadora_trimestral
    description: Regime especial trimestral por operadora para o Core ANS.
    columns:
      - name: registro_ans
        data_tests:
          - not_null
      - name: trimestre
        data_tests:
          - not_null
  - name: api_taxa_resolutividade_operadora_trimestral
    description: Taxa de resolutividade trimestral por operadora para o Core ANS.
    columns:
      - name: registro_ans
        data_tests:
          - not_null
      - name: trimestre
        data_tests:
          - not_null
