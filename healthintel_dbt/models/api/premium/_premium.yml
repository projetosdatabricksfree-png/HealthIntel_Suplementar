version: 2

models:
  - name: api_premium_operadora_360_validado
    description: >
      Superfície de serviço premium para FastAPI, derivada de consumo_premium_operadora_360_validado.
      Publica apenas operadoras com registro ANS e CNPJ tecnicamente válidos. Granularidade:
      competencia e registro_ans. Owner: engenharia de dados HealthIntel.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: ["competencia", "registro_ans"]
    columns:
      - name: competencia
        data_tests:
          - not_null
      - name: registro_ans
        data_tests:
          - not_null
      - name: cnpj_normalizado
        data_tests:
          - not_null
      - name: documento_quality_status
        data_tests:
          - not_null
          - accepted_values:
              values: ['VALIDO']
      - name: cnpj_digito_valido
        data_tests:
          - not_null
          - accepted_values:
              values: [true]
              quote: false
      - name: quality_score_documental
        data_tests:
          - not_null

  - name: api_premium_cnes_estabelecimento_validado
    description: >
      Superfície de serviço premium para estabelecimentos CNES validados. Granularidade:
      competencia e cnes_normalizado.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: ["competencia", "cnes_normalizado"]
    columns:
      - name: competencia
        data_tests:
          - not_null
      - name: cnes_normalizado
        data_tests:
          - not_null
      - name: cnpj_normalizado
        data_tests:
          - not_null
      - name: cd_municipio
        data_tests:
          - not_null
      - name: documento_quality_status
        data_tests:
          - not_null
          - accepted_values:
              values: ['VALIDO']
      - name: cnes_formato_valido
        data_tests:
          - not_null
          - accepted_values:
              values: [true]
              quote: false
      - name: cnpj_digito_valido
        data_tests:
          - not_null
          - accepted_values:
              values: [true]
              quote: false
      - name: quality_score_cnes
        data_tests:
          - not_null

  - name: api_premium_tiss_procedimento_tuss_validado
    description: >
      Superfície de serviço premium TISS/TUSS por procedimento, com operadora master resolvida.
      Modo CI sintético — não comercial.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: ["trimestre", "registro_ans", "cd_procedimento_tuss"]
    columns:
      - name: trimestre
        data_tests:
          - not_null
      - name: registro_ans
        data_tests:
          - not_null
      - name: cd_procedimento_tuss
        data_tests:
          - not_null

  - name: api_premium_tuss_procedimento
    description: >
      Superfície de serviço premium para catálogo TUSS de procedimentos. Modo CI sintético
      — não comercial. Granularidade: código_tuss e versão.
    columns:
      - name: codigo_tuss
        data_tests:
          - not_null

  - name: api_premium_mdm_operadora
    description: >
      Superfície de serviço premium para operadoras master públicas resolvidas.
      Granularidade: operadora_master_id.
    columns:
      - name: operadora_master_id
        data_tests:
          - not_null
          - unique
      - name: registro_ans_canonico
        data_tests:
          - not_null

  - name: api_premium_mdm_prestador
    description: >
      Superfície de serviço premium para prestadores master públicos resolvidos.
      Granularidade: prestador_master_id.
    columns:
      - name: prestador_master_id
        data_tests:
          - not_null
          - unique

  - name: api_premium_contrato_validado
    description: >
      Superfície de serviço premium para contratos privados validados por tenant.
      FastAPI deve aplicar filtro de tenant na Sprint 32.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: ["tenant_id", "contrato_master_id"]
    columns:
      - name: tenant_id
        data_tests:
          - not_null
      - name: contrato_master_id
        data_tests:
          - not_null

  - name: api_premium_subfatura_validada
    description: >
      Superfície de serviço premium para subfaturas privadas validadas por tenant.
      FastAPI deve aplicar filtro de tenant na Sprint 32.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: ["tenant_id", "subfatura_master_id", "competencia"]
    columns:
      - name: tenant_id
        data_tests:
          - not_null
      - name: subfatura_master_id
        data_tests:
          - not_null
      - name: contrato_master_id
        data_tests:
          - not_null

  - name: api_premium_quality_dataset
    description: >
      Resumo premium de qualidade documental por fonte e status. Granularidade:
      fonte_documento e documento_quality_status.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: ["fonte_documento", "documento_quality_status"]
    columns:
      - name: fonte_documento
        data_tests:
          - not_null
      - name: documento_quality_status
        data_tests:
          - not_null
          - accepted_values:
              values: ['VALIDO', 'INVALIDO_FORMATO', 'INVALIDO_DIGITO', 'SEQUENCIA_INVALIDA', 'NULO']
      - name: quality_score_documental
        data_tests:
          - not_null
