version: 2

models:
  - name: api_prata_cadop
    description: Espelho analitico de CADOP com metadados de qualidade.
  - name: api_prata_sib_operadora
    description: Espelho analitico do SIB por operadora com metadados de qualidade.
  - name: api_prata_sib_municipio
    description: Espelho analitico do SIB por municipio com metadados de qualidade.
  - name: api_prata_igr
    description: Espelho analitico do IGR com metadados de qualidade.
  - name: api_prata_nip
    description: Espelho analitico de NIP com metadados de qualidade.
  - name: api_prata_idss
    description: Espelho analitico de IDSS com metadados de qualidade.
  - name: api_prata_diops
    description: Espelho analitico do DIOPS com metadados de qualidade.
  - name: api_prata_fip
    description: Espelho analitico do FIP com metadados de qualidade.
  - name: api_prata_vda
    description: Espelho analitico do VDA com metadados de qualidade.
  - name: api_prata_glosa
    description: Espelho analitico de glosa com metadados de qualidade.
  - name: api_prata_rede_assistencial
    description: Espelho analitico da rede assistencial com metadados de qualidade.
  - name: api_prata_operadora_enriquecida
    description: Operadora enriquecida com crescimento de beneficiarios.
  - name: api_prata_municipio_metrica
    description: Metricas municipais de mercado e concentracao.
  - name: api_prata_financeiro_periodo
    description: Consolidacao financeira por operadora e trimestre.
  - name: api_prata_cnes_municipio
    description: Serving API Prata para `/v1/prata/cnes/municipio`, derivado de `int_cnes_municipio_resumo`.
    config:
      tags: ["prata", "cnes"]
    columns:
      - name: competencia
        description: Competencia mensal de referencia.
        data_tests:
          - not_null
      - name: cd_municipio
        description: Codigo IBGE do municipio.
        data_tests:
          - not_null
      - name: tipo_unidade
        description: Tipo de unidade CNES.
        data_tests:
          - not_null
      - name: taxa_aprovacao_lote
        description: Taxa de aprovacao do lote de origem.
  - name: api_prata_cnes_rede_gap
    description: Serving API Prata para `/v1/prata/cnes/rede-gap`, derivado de `fat_cnes_rede_gap_municipio`.
    config:
      tags: ["prata", "cnes", "rede"]
    columns:
      - name: competencia
        description: Competencia mensal de referencia.
        data_tests:
          - not_null
      - name: cd_municipio
        description: Codigo IBGE do municipio.
        data_tests:
          - not_null
      - name: tipo_unidade
        description: Tipo de unidade CNES.
        data_tests:
          - not_null
      - name: taxa_aprovacao_lote
        description: Taxa de aprovacao do lote de origem.
  - name: api_prata_tiss_procedimento
    description: Serving API Prata para `/v1/prata/tiss/procedimento`, derivado de `int_tiss_operadora_trimestre`.
    config:
      tags: ["prata", "tiss"]
    columns:
      - name: trimestre
        description: Trimestre de referencia.
        data_tests:
          - not_null
      - name: registro_ans
        description: Registro ANS da operadora.
        data_tests:
          - not_null
      - name: grupo_procedimento
        description: Grupo de procedimento TISS.
        data_tests:
          - not_null
      - name: taxa_aprovacao_lote
        description: Taxa de aprovacao do lote de origem.
