name: healthintel_dbt
version: 1.0.0
config-version: 2

profile: healthintel_dbt

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
packages-install-path: "dbt_packages"

models:
  healthintel_dbt:
    staging:
      +schema: stg_ans
      +materialized: view
    intermediate:
      +schema: int_ans
      +materialized: ephemeral
    marts:
      dimensao:
        +schema: nucleo_ans
        +materialized: table
      fato:
        +schema: nucleo_ans
        +materialized: incremental
    api:
      +schema: api_ans
      +materialized: table
      bronze:
        +materialized: view
      prata:
        +materialized: table

vars:
  score_pesos:
    crescimento: 0.40
    qualidade: 0.30
    estabilidade: 0.20
    presenca: 0.10
  score_regulatorio_pesos:
    igr_peso: 0.30
    nip_peso: 0.25
    rn623_peso: 0.15
    prudencial_peso: 0.20
    taxa_resolutividade_peso: 0.10
  score_v2_pesos:
    score_core_peso: 0.40
    score_regulatorio_peso: 0.30
    score_financeiro_peso: 0.20
    penalizacoes_peso: 0.10
  score_v3_pesos:
    core: 0.25
    regulatorio: 0.25
    financeiro: 0.20
    rede: 0.20
    estrutural: 0.10
  taxa_glosa_limite: 0.15
  quality_gates:
    min_taxa_aprovacao_stg: 0.95
    min_integridade_referencial_int: 1.0
    min_linhas_fato: 1

seeds:
  healthintel_dbt:
    +schema: ref_ans
    +tags: ["financeiro", "financeiro_v2"]
