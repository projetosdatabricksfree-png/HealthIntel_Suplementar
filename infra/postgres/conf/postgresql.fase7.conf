# Sprint 39 / HIS-39.2 — Parâmetros WAL e archive para pgBackRest
#
# APLICAÇÃO NA VPS (produção):
#   Adicionar ao final de postgresql.conf:
#     include = '/etc/postgresql/conf.d/postgresql.fase7.conf'
#   Reiniciar o serviço:
#     sudo systemctl reload postgresql   # wal_level e archive_mode exigem restart completo
#     sudo systemctl restart postgresql
#
# APLICAÇÃO VIA ALTER SYSTEM (sem editar arquivo, reinicializa sessões):
#   ALTER SYSTEM SET wal_level = 'replica';
#   ALTER SYSTEM SET archive_mode = 'on';
#   ALTER SYSTEM SET archive_command = 'pgbackrest --stanza=healthintel archive-push %p';
#   ALTER SYSTEM SET archive_timeout = 3600;
#   ALTER SYSTEM SET max_wal_senders = 4;
#   ALTER SYSTEM SET wal_keep_size = '1GB';
#   ALTER SYSTEM SET checkpoint_timeout = '5min';
#   SELECT pg_reload_conf();
#   -- wal_level e archive_mode exigem restart completo; pg_reload_conf() não é suficiente para eles.
#
# APLICAÇÃO NO DOCKER COMPOSE (dev local):
#   Montar este diretório no serviço postgres e passar flags via command:
#     volumes:
#       - ./postgres/conf:/etc/postgresql/conf.d:ro
#     command: >
#       postgres
#       -c wal_level=replica
#       -c archive_mode=on
#       -c "archive_command=pgbackrest --stanza=healthintel archive-push %p"
#       -c archive_timeout=3600
#       -c max_wal_senders=4
#       -c wal_keep_size=1GB
#       -c checkpoint_timeout=5min
#   ATENÇÃO: archive_mode=on em dev local fará o PostgreSQL tentar executar archive_command
#   a cada WAL gerado. Sem pgBackRest instalado no container, cada archive falhará e o
#   PostgreSQL registrará erros. Para dev local puro, omitir archive_mode e archive_command.
#
# ROLLBACK:
#   VPS:  remover a linha include de postgresql.conf + restart.
#   ALTER SYSTEM: ALTER SYSTEM RESET <param>; para cada parâmetro + restart.
#   compose: remover as flags -c do command + recreate do container.
#   Manter plataforma.backup_execucao intacta para auditoria histórica.
#
# ADVERTÊNCIA — archive_timeout:
#   archive_timeout=3600 (1h) significa que o PostgreSQL fecha e arquiva o WAL corrente
#   a cada 1h, mesmo que não esteja cheio (16 MB padrão). Segmentos parciais arquivados
#   ocupam 16 MB cada. Com 24 segmentos/dia somente por timeout, o consumo de WAL archive
#   é de ~384 MB/dia antes de qualquer carga real. Valores menores que 600s aumentam
#   este volume proporcionalmente sem benefício equivalente de RPO em ambientes com
#   carga baixa. 3600s é o equilíbrio adotado: RPO ≤ 1h com custo de storage aceitável.

wal_level = replica
archive_mode = on
archive_command = 'pgbackrest --stanza=healthintel archive-push %p'
archive_timeout = 3600
max_wal_senders = 4
wal_keep_size = 1GB
checkpoint_timeout = 5min
