# Sprint 39 / HIS-39.3 — Template de configuração pgBackRest
#
# ESTE ARQUIVO É UM TEMPLATE. Os marcadores ${...} são variáveis de ambiente
# que devem ser substituídas antes de copiar para /etc/pgbackrest/pgbackrest.conf na VPS.
#
# MATERIALIZAÇÃO NA VPS:
#   # 1. Carregar variáveis do cofre de segredos ou do .env da VPS (nunca do git):
#   set -a; source /etc/healthintel/pgbackrest.env; set +a
#   # 2. Substituir variáveis e instalar:
#   envsubst < /repo/infra/pgbackrest/pgbackrest.conf > /etc/pgbackrest/pgbackrest.conf
#   chmod 640 /etc/pgbackrest/pgbackrest.conf
#   chown postgres:postgres /etc/pgbackrest/pgbackrest.conf
#
# SECRET MANAGER EM PRODUÇÃO:
#   Nunca armazenar repo2-s3-key, repo2-s3-key-secret ou repo2-cipher-pass no git.
#   Opções ordenadas por preferência:
#     1. HashiCorp Vault (vault kv get -field=value secret/pgbackrest/repo2)
#     2. AWS Secrets Manager / GCP Secret Manager (aws secretsmanager get-secret-value)
#     3. Arquivo /etc/healthintel/pgbackrest.env com chmod 600, fora do git, somente na VPS
#   Em todos os casos: o arquivo materializado /etc/pgbackrest/pgbackrest.conf deve ter
#   permissão 640 (postgres:postgres) para que o processo PostgreSQL possa lê-lo.
#
# VARIÁVEIS NECESSÁRIAS (ver .env.exemplo para lista completa):
#   PGBACKREST_REPO2_ENDPOINT   — endpoint S3-compatible (ex: s3.us-east-1.amazonaws.com)
#   PGBACKREST_REPO2_BUCKET     — nome do bucket
#   PGBACKREST_REPO2_REGION     — região AWS/equivalente (ex: us-east-1, auto para R2)
#   PGBACKREST_REPO2_KEY        — Access Key ID
#   PGBACKREST_REPO2_KEY_SECRET — Secret Access Key
#   PGBACKREST_REPO2_CIPHER_PASS — senha de criptografia AES-256 (min. 32 chars aleatórios)
#   POSTGRES_DATA_DIR           — diretório de dados do PostgreSQL (ex: /var/lib/postgresql/16/main)
#
# CUSTOS E PROVEDOR S3-COMPATIBLE:
#   Não manter preços neste template para evitar divergência operacional.
#   A comparação vigente fica em docs/operacao/backup_retencao_postgres.md
#   e deve ser revisada antes da escolha final do repo2 para cliente pagante.
#
# ROLLBACK:
#   VPS:  rm /etc/pgbackrest/pgbackrest.conf; parar timers; PostgreSQL continua operando
#         (archive_command falhará silenciosamente até que postgresql.conf seja revertido).
#   Manter plataforma.backup_execucao intacta para auditoria histórica.

[global]
process-max=2
log-level-console=info
log-level-file=detail
start-fast=y
compress-type=zst
compress-level=3

repo1-path=/var/lib/pgbackrest
repo1-retention-full-type=time
repo1-retention-full=2
repo1-retention-diff=2
# ATENÇÃO: repo1-retention-diff = quantidade de backups diferenciais retidos (não dias).
# O pgBackRest não oferece retention-diff-type=time. A retenção temporal de diffs
# é consequência da retenção temporal do full: diffs anteriores ao full mais antigo
# são descartados automaticamente.

repo2-type=s3
repo2-s3-endpoint=${PGBACKREST_REPO2_ENDPOINT}
repo2-s3-bucket=${PGBACKREST_REPO2_BUCKET}
repo2-s3-region=${PGBACKREST_REPO2_REGION}
repo2-s3-key=${PGBACKREST_REPO2_KEY}
repo2-s3-key-secret=${PGBACKREST_REPO2_KEY_SECRET}
repo2-cipher-type=aes-256-cbc
repo2-cipher-pass=${PGBACKREST_REPO2_CIPHER_PASS}
repo2-retention-full-type=time
repo2-retention-full=35
repo2-retention-diff=7
# ATENÇÃO: repo2-retention-diff = quantidade de backups diferenciais retidos, não dias.
# Não há retention-diff-type=time no pgBackRest.
# Diferenciais anteriores ao full mais antigo retido são descartados automaticamente.

[healthintel]
pg1-path=${POSTGRES_DATA_DIR}
pg1-port=5432
pg1-user=healthintel
